# =============================================================================
# ArborWatch — CI/CD Pipeline (GitHub Actions)
# =============================================================================
# Runs on: push to main, pull requests to main
# Steps: Lint → Type Check → Test → Deploy (on main)
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: config.settings.local
  AWS_REGION: us-east-1
  ECR_REPOSITORY: arborwatch
  ECS_CLUSTER: arborwatch-cluster
  ECS_SERVICE_WEB: arborwatch-web
  ECS_SERVICE_WORKER: arborwatch-celery-worker
  ECS_SERVICE_BEAT: arborwatch-celery-beat

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Format Check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: Pipfile.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pipenv
          pipenv install --dev --system

      - name: Run Black (format check)
        continue-on-error: true
        run: black --check apps/ config/

      - name: Run isort (import order check)
        continue-on-error: true
        run: isort --check-only apps/ config/

      - name: Run Flake8
        continue-on-error: true
        run: flake8 apps/ config/

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: arborwatch_test
          POSTGRES_USER: arborwatch
          POSTGRES_PASSWORD: arborwatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arborwatch -d arborwatch_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_DB: arborwatch_test
      POSTGRES_USER: arborwatch
      POSTGRES_PASSWORD: arborwatch
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      DJANGO_SECRET_KEY: ci-test-secret-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: Pipfile.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pipenv
          pipenv install --dev --system

      - name: Run tests
        run: |
          python -m pytest \
            --cov=apps \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Deploy to AWS (Only on main branch)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
          # Promote to job-level env so downstream steps can reference them
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Fetch S3 Media Bucket Name
        id: fetch-media-bucket
        run: |
          MEDIA_BUCKET=$(aws s3api list-buckets --query "Buckets[?contains(Name, 'arborwatch-media-')].Name" --output text)
          echo "MEDIA_BUCKET=$MEDIA_BUCKET" >> $GITHUB_ENV

      - name: Collect and Sync Static Files
        run: |
          # 1. Create a container from the built image
          CONTAINER_ID=$(docker create --entrypoint bash \
            -e DJANGO_SETTINGS_MODULE=config.settings.local \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -c "python manage.py collectstatic --noinput")
          
          # 2. Run collectstatic inside the container
          docker start -a $CONTAINER_ID
          
          # 3. Copy the collected static files to the GitHub Actions runner
          docker cp $CONTAINER_ID:/app/staticfiles ./staticfiles
          
          # 4. Clean up the container
          docker rm $CONTAINER_ID
          
          # 5. Sync the files directly to the production AWS S3 Media Bucket
          aws s3 sync ./staticfiles/ s3://$MEDIA_BUCKET/ --delete --exclude "media/*" --cache-control "max-age=86400"

      - name: Force ECS Web Service Update
        run: aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_WEB }} --force-new-deployment

      - name: Force ECS Celery Worker Update
        run: aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_WORKER }} --force-new-deployment

      - name: Force ECS Celery Beat Update
        run: aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_BEAT }} --force-new-deployment

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Deploy Frontend to S3 and Invalidate CloudFront
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="arborwatch-frontend-${ACCOUNT_ID}"
          
          # Sync build output to S3
          aws s3 sync frontend/dist/ s3://${BUCKET_NAME}/ --delete
          
          # Invalidate CloudFront (find the distribution ID connected to this bucket)
          DISTRIBUTION_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Origins.Items[0].Id=='S3-${BUCKET_NAME}'].Id" --output text)
          if [ -n "$DISTRIBUTION_ID" ] && [ "$DISTRIBUTION_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
          fi
