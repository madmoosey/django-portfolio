# =============================================================================
# ArborWatch — CI Pipeline (GitHub Actions)
# =============================================================================
# Runs on: push to main, pull requests to main
# Steps: Lint → Type Check → Test
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: config.settings.local

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Format Check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: Pipfile.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pipenv
          pipenv install --dev --system

      - name: Run Black (format check)
        run: black --check apps/ config/

      - name: Run isort (import order check)
        run: isort --check-only apps/ config/

      - name: Run Flake8
        run: flake8 apps/ config/

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: arborwatch_test
          POSTGRES_USER: arborwatch
          POSTGRES_PASSWORD: arborwatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arborwatch -d arborwatch_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_DB: arborwatch_test
      POSTGRES_USER: arborwatch
      POSTGRES_PASSWORD: arborwatch
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      DJANGO_SECRET_KEY: ci-test-secret-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: Pipfile.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pipenv
          pipenv install --dev --system

      - name: Run tests
        run: |
          python -m pytest \
            --cov=apps \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
