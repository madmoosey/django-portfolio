# =============================================================================
# ArborWatch — Docker Compose (Production-like)
# =============================================================================
# Services: web (Django), celery-worker, celery-beat, flower, postgres, redis
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose logs -f web        # Follow Django logs
#   docker compose exec web bash      # Shell into web container
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL + PostGIS
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4
    container_name: arborwatch-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arborwatch}
      POSTGRES_USER: ${POSTGRES_USER:-arborwatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arborwatch}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-vol:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arborwatch} -d ${POSTGRES_DB:-arborwatch}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis (Cache + Celery Broker)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: arborwatch-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Django Web Server
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arborwatch-web
    command: >
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --worker-class gthread --threads 2 --timeout 120 --access-logfile - --error-logfile - --reload
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - POSTGRES_DB=${POSTGRES_DB:-arborwatch}
      - POSTGRES_USER=${POSTGRES_USER:-arborwatch}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-arborwatch}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - GFW_API_KEY=${GFW_API_KEY:-}
      - NOAA_CDO_TOKEN=${NOAA_CDO_TOKEN:-}
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - .:/app
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arborwatch-celery-worker
    command: >
      celery -A config worker --loglevel=info --concurrency=2 --queues=default,ingest,weather,analysis --max-tasks-per-child=1000 -E
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - POSTGRES_DB=${POSTGRES_DB:-arborwatch}
      - POSTGRES_USER=${POSTGRES_USER:-arborwatch}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-arborwatch}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - SKIP_COLLECTSTATIC=true
      - GFW_API_KEY=${GFW_API_KEY:-}
      - NOAA_CDO_TOKEN=${NOAA_CDO_TOKEN:-}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Celery Beat (Periodic Task Scheduler)
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arborwatch-celery-beat
    command: >
      celery -A config beat --loglevel=info --scheduler=django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - POSTGRES_DB=${POSTGRES_DB:-arborwatch}
      - POSTGRES_USER=${POSTGRES_USER:-arborwatch}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-arborwatch}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - SKIP_COLLECTSTATIC=true
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Flower (Celery Monitoring)
  # ---------------------------------------------------------------------------
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arborwatch-flower
    command: >
      celery -A config flower --port=5555 --broker_api=redis://redis:6379/1 --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - POSTGRES_DB=${POSTGRES_DB:-arborwatch}
      - POSTGRES_USER=${POSTGRES_USER:-arborwatch}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-arborwatch}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - SKIP_COLLECTSTATIC=true
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # React Frontend (Vite)
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    container_name: arborwatch-frontend
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - web
    restart: unless-stopped

volumes:
  db-vol:
  redis_data:
  static_data:
  media_data:
